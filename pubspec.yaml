name: auraq
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_islamic_icons: ^1.0.2
  google_fonts: ^8.1.0
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_logos/auraq_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/app_logos/auraq_logo.png
